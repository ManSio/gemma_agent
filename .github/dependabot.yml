# Авто-PR при новых версиях PyPI (см. docs/UPSTREAM_STACK_RU.md).
# После merge: release_guard → при необходимости DEV_DIARY → деплой по deploy-via-git-and-panel.mdc.

version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Minsk
    open-pull-requests-limit: 8
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      pip-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Minsk
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: ci
