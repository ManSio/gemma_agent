name: release-guard

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: release-guard + privacy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pydantic
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"

      - name: Privacy scan (CI mode)
        run: python scripts/check_public_privacy.py --ci
        env:
          PYTHONPATH: .

      - name: Release guard (smoke + anti-regression)
        run: python scripts/release_guard.py
        env:
          PYTHONPATH: .
          PYTHONIOENCODING: utf-8
          GITHUB_ACTIONS: "true"

  full-tests:
    name: full pytest
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pydantic

      - name: Full pytest
        run: python -m pytest -q tests/
        env:
          PYTHONPATH: .
          PYTHONIOENCODING: utf-8
