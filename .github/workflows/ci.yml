name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff syntax check (E9)
        run: ruff check --select E9 core modules scripts main.py api.py

  test:
    name: pytest (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, full]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pydantic

      - name: Repo stats (test count evidence)
        run: python scripts/print_repo_stats.py
        env:
          PYTHONPATH: .

      - name: Collect test count
        run: |
          python -m pytest tests/ --collect-only -q | tail -1 | tee test_count.txt
        env:
          PYTHONPATH: .

      - name: Smoke tests (release guard subset)
        if: matrix.suite == 'smoke'
        run: python scripts/release_guard.py --smoke
        env:
          PYTHONPATH: .
          PYTHONIOENCODING: utf-8
          GITHUB_ACTIONS: "true"

      - name: Full pytest suite
        if: matrix.suite == 'full'
        run: python -m pytest -q tests/
        env:
          PYTHONPATH: .
          PYTHONIOENCODING: utf-8

  privacy:
    name: privacy + security audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Dependency vulnerability scan
        run: bash scripts/pip_audit.sh

      - name: Privacy scan
        run: python scripts/check_public_privacy.py --ci
        env:
          PYTHONPATH: .

      - name: Security audit script
        run: python scripts/agent_security_audit.py
        env:
          PYTHONPATH: .
