# Keep branch `main` identical to `master` so crawlers using /main/ raw URLs do not 404.
name: Sync main branch

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fast-forward main to master
        run: git push origin "HEAD:refs/heads/main"
