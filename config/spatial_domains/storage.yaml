suggestions_ru:
  - "Узкая комната: штанги обычно только на одной длинной стене (~600 мм глубиной)."
  - "Противоположная стена — полки/обувь ~333 мм или пусто; не две линии штанг при ширине <1,9 м."
render_hints_ru:
