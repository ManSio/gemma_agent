# Словарь условных обозначений: русские/ГОСТ подписи + алиасы vision.
# type — канонический id для fixtures[] / openings[].kind

walls:
  kinds:
    load_bearing:
      label_ru: несущая стена
      aliases: [несущ, несущая, bearing, load]
    partition:
